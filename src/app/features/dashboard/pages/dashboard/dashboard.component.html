<div class="dashboard-shell">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1">Survey Analytics</h2>
            <p class="text-muted mb-0">Track response volume and question composition at a glance.</p>
        </div>
        <div class="form-group">
            <button class="btn btn-outline-success m-2" routerLink="/survey">Go to Survey Builder</button>
            <button class="btn btn-outline-danger" routerLink="/login" (click)="surveyService.logout()">Logout</button>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <app-bar-chart [data]="chartData()"></app-bar-chart>
        </div>
        <div class="col-lg-5">
            <app-pie-chart [data]="piaChartData()"></app-pie-chart>
        </div>
    </div>
</div>
